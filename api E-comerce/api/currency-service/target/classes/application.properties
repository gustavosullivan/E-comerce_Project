spring.application.name=currency-service
server.port=8001

# Parte 1 - Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true

# Parte 2 - Health Check API Pattern
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# Parte 3 e 4 - Info e Metadata
info.app.name=${spring.application.name}
info.app.description=Servico responsavel pela conversao de moedas
info.app.autor=Bruno Galvagni
eureka.instance.metadata-map.github.repo=Brunog21/ExtraG1Microservices

# RESILIENCE PATTERNS - TIMEOUT (BCBClient)
spring.cloud.openfeign.client.config.bcb-client.connect-timeout=1000
spring.cloud.openfeign.client.config.bcb-client.read-timeout=3000

# RESILIENCE PATTERNS - RETRY (BCBClient)
resilience4j.retry.instances.bcb-client.max-attempts=3
resilience4j.retry.instances.bcb-client.wait-duration=500ms
resilience4j.retry.instances.bcb-client.enable-exponential-backoff=true
resilience4j.retry.instances.bcb-client.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.bcb-client.enable-randomized-wait=true
resilience4j.retry.instances.bcb-client.randomized-wait-factor=0.5
resilience4j.retry.instances.bcb-client.ignore-exceptions[0]=feign.FeignException$FeignClientException
resilience4j.retry.instances.bcb-client.retry-exceptions[0]=feign.RetryableException
resilience4j.retry.instances.bcb-client.retry-exceptions[1]=java.net.SocketTimeoutException
resilience4j.retry.instances.bcb-client.retry-exceptions[2]=feign.FeignException$FeignServerException

# RESILIENCE PATTERNS - CACHING
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15s

# RESILIENCE PATTERNS - CIRCUIT BREAKER
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.bcb-client.register-health-indicator=true
resilience4j.circuitbreaker.instances.bcb-client.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bcb-client.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.bcb-client.failureRateThreshold=50
resilience4j.circuitbreaker.instances.bcb-client.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.bcb-client.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.bcb-client.automaticTransitionFromOpenToHalfOpenEnabled=true

# CONFIGURACOES DE BANCO DE DADOS
spring.datasource.url=jdbc:postgresql://127.0.0.1:55432/db_currency
spring.datasource.username=postgres
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.locations=classpath:db_migration

management.health.circuitbreakers.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true
